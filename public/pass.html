<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Gate Pass · SNIST</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #1a1a1a; font-family: 'Google Sans', Roboto, sans-serif; color: #e8e8e8; }
  body { max-width: 430px; margin: 0 auto; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; flex-shrink: 0; }
  .nav-back, .nav-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; }
  .nav-back svg, .nav-btn svg { width: 22px; height: 22px; fill: #c8c8c8; }
  .nav-actions { display: flex; align-items: center; }
  .nav-menu-wrap { position: relative; }
  .nav-menu { position: absolute; top: 44px; right: 0; background: #2d2d2d; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); min-width: 160px; z-index: 200; overflow: hidden; display: none; flex-direction: column; }
  .nav-menu.open { display: flex; }
  .nav-menu-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; font-size: 14px; color: #e8e8e8; cursor: pointer; border: none; background: none; text-align: left; width: 100%; font-family: inherit; }
  .subject-area { padding: 2px 16px 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-shrink: 0; }
  .subject-text { font-size: 21px; font-weight: 400; color: #e8e8e8; line-height: 1.3; }
  .inbox-badge { display: inline-block; background: #3c4043; color: #bdc1c6; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-top: 5px; font-weight: 500; }
  .star-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-top: 4px; }
  .star-btn svg { width: 24px; height: 24px; fill: none; stroke: #9aa0a6; stroke-width: 1.5; }
  .email-list { flex: 1; overflow-y: auto; padding: 0 12px 8px; display: flex; flex-direction: column; gap: 8px; }
  .email-card { background: #111; border-radius: 16px; padding: 14px 16px; }
  .avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 19px; font-weight: 600; color: #fff; flex-shrink: 0; }
  .avatar-student { background: #6b7fad; }
  .avatar-gatepass { background: #4a7a5a; }
  .email-header { display: flex; align-items: flex-start; gap: 14px; }
  .email-meta { flex: 1; min-width: 0; }
  .sender-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
  .sender-name { font-size: 14px; font-weight: 700; color: #e8e8e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .email-date { font-size: 12px; color: #9aa0a6; flex-shrink: 0; margin-left: 8px; }
  .email-preview { font-size: 13px; color: #9aa0a6; line-height: 1.45; }
  .email-to { font-size: 13px; color: #9aa0a6; margin-top: 2px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-weight: 400; }
  .email-to .chevron-v { font-size: 11px; color: #9aa0a6; display: inline-block; margin-top: 1px; }
  .email-to.open .chevron-v { transform: rotate(180deg); }
  .reply-actions { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
  .reply-icon-btn { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; }
  .reply-icon-btn svg { width: 20px; height: 20px; fill: #9aa0a6; }
  .email-details { display: none; margin: 8px 0 4px; padding: 10px 12px; background: rgba(255,255,255,0.04); border-radius: 8px; font-size: 12px; color: #9aa0a6; line-height: 1.9; }
  .email-details.open { display: block; }
  .detail-row { display: flex; gap: 12px; margin-bottom: 2px; }
  .detail-label { min-width: 38px; color: #6b7280; flex-shrink: 0; }
  .detail-val { color: #c8cdd3; flex: 1; word-break: break-all; }
  .detail-lock { display: flex; align-items: flex-start; gap: 6px; margin-top: 6px; }
  .detail-lock svg { width: 13px; height: 13px; fill: #9aa0a6; flex-shrink: 0; margin-top: 1px; }
  .lock-link { color: #8ab4f8; display: block; cursor: pointer; }
  .approved-text { font-size: 14px; color: #e8eaed; margin: 14px 0 12px; line-height: 1.5; font-weight: 400; }
  .show-quoted { font-size: 13px; color: #8ab4f8; cursor: pointer; margin-bottom: 0; font-weight: 400; }
  .quoted-wrap { display: none; margin-top: 0; padding-left: 0px; }
  .quoted-prefix { margin-top: 16px; margin-bottom: 2px; color: #9aa0a6; font-size: 13.5px; line-height: 1.35; font-family: Roboto, Arial, sans-serif; letter-spacing: 0.2px; }
  .quoted-body { margin-left: 8px; padding-left: 6px; border-left: 2px solid #5f6368; color: #bdc1c6; font-size: 14px; line-height: 1.45; font-family: Roboto, Arial, sans-serif; letter-spacing: 0.2px; word-break: break-word; }
  .quick-replies { display: flex; gap: 10px; padding: 10px 12px 8px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
  .quick-replies::-webkit-scrollbar { display: none; }
  .qr-btn { background: transparent; border: 1.5px solid #3c4043; border-radius: 14px; color: #e8e8e8; font-size: 14px; font-weight: 600; padding: 13px 12px; white-space: normal; text-align: center; cursor: pointer; flex: 1; min-width: 90px; max-width: 140px; line-height: 1.3; font-family: inherit; }
  .qr-btn.selected { background: rgba(138,180,248,0.15); border-color: #8ab4f8; }
  .divider { height: 1px; background: #2a2a2a; flex-shrink: 0; }
  .addons-bar { display: flex; justify-content: space-between; align-items: center; padding: 9px 16px; color: #9aa0a6; font-size: 12px; flex-shrink: 0; }
  .addons-icons { display: flex; gap: 8px; }
  .addon-icon { width: 38px; height: 38px; border-radius: 8px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; }
  .addon-icon svg { width: 22px; height: 22px; fill: #9aa0a6; }
  .bottom-actions { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px 9px; gap: 8px; flex-shrink: 0; }
  .action-btn { display: flex; align-items: center; gap: 6px; background: #2e2e2e; border: none; border-radius: 28px; color: #e0e0e0; font-size: 14px; font-weight: 500; padding: 11px 16px; cursor: pointer; flex: 1; justify-content: center; font-family: inherit; }
  .action-btn svg { width: 18px; height: 18px; fill: #e0e0e0; }
  .action-btn-icon { width: 46px; height: 46px; background: #2e2e2e; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .action-btn-icon svg { width: 22px; height: 22px; fill: #e0e0e0; }
  .android-nav { display: flex; align-items: center; justify-content: space-around; padding: 10px 0 12px; background: #111; border-top: 1px solid #2a2a2a; flex-shrink: 0; }
  .android-nav-btn { display: flex; align-items: center; justify-content: center; width: 56px; height: 44px; position: relative; cursor: pointer; }
  .android-nav-btn svg { width: 26px; height: 26px; fill: #c8c8c8; }
  .android-nav-btn.has-badge::after { content: '99+'; position: absolute; top: 0px; left: 32px; background: #ea4335; color: #fff; font-size: 10px; font-weight: 700; padding: 1px 4px; border-radius: 10px; line-height: 16px; }
  .nav-home-bar { display: flex; justify-content: center; padding: 4px 0 2px; background: #111; }
  .nav-home-pill { width: 130px; height: 4px; background: #555; border-radius: 2px; }

<script>
  // ── Token-based system: fetch data from /api/pass?t=TOKEN ──────────────────
  const token = new URLSearchParams(window.location.search).get('t');
  if (!token) showExpired('No token provided.');

  async function init() {
    let d;
    try {
      const res = await fetch(`/api/pass?t=${token}`);
      if (!res.ok) { showExpired('This link has expired or is invalid.'); return; }
      d = await res.json();
    } catch (e) { showExpired('Network error. Please try again.'); return; }

    // ── Map new fields to display ────────────────────────────────────────────
    // Fields from bot: subject, name, emailid, monthwithdate, reason, branch, time, rollno
    const branch    = (d.branch || 'ECE').toUpperCase();
    const name      = d.name || 'Student';
    const emailid   = d.emailid || '';
    const rollno    = d.rollno || '';
    const reason    = d.reason || '';
    const subject   = d.subject || 'Requesting for gate pass';
    const dateShort = d.monthwithdate || new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const timeStr   = d.time || new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    const now       = Date.now();

    document.getElementById('subjectLine').textContent = subject;
    document.getElementById('av1').textContent = name.trim()[0].toUpperCase();
    document.getElementById('senderName1').textContent = name;
    document.getElementById('emailDate1').textContent = dateShort;
    document.getElementById('preview1').textContent = reason;
    document.getElementById('replyFrom').textContent = 'Gatepass ' + branch;
    document.getElementById('toName').textContent = name;

    function timeAgo(ts) {
      const diff = Math.floor((Date.now() - ts) / 1000);
      if (diff < 60) return diff + ' sec ago';
      if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
      return Math.floor(diff / 3600) + ' hrs ago';
    }
    function updateReplyTime() { document.getElementById('replyTime').textContent = timeAgo(now); }
    updateReplyTime(); setInterval(updateReplyTime, 30000);

    document.getElementById('detailFrom').textContent = 'Gatepass ' + branch + ' · ' + branch.toLowerCase() + '-gatepass@sreenidhi.edu.in';
    document.getElementById('detailTo').innerHTML = name + ' (' + rollno + ') &bull; ' + emailid + '<br>Gatepass SNIST &bull; gatepass@sreenidhi.edu.in';
    document.getElementById('detailDate').textContent = dateShort + ', ' + timeStr;
    document.getElementById('quotedPrefix').innerHTML =
      'On ' + dateShort + ' at ' + timeStr + ' ' + name +
      ' &lt;<span style="color:#8ab4f8">' + emailid + '</span>&gt; wrote:';

    const body = reason + ' Requesting for gate pass for the same. Please approve my request at the earliest.';
    document.getElementById('quotedBody').textContent = body;

    document.getElementById('detailsToggle').addEventListener('click', function () {
      this.classList.toggle('open');
      document.getElementById('emailDetails').classList.toggle('open');
    });
    document.getElementById('quotedToggle').addEventListener('click', function () {
      const w = document.getElementById('quotedWrap');
      const open = w.style.display === 'block';
      w.style.display = open ? 'none' : 'block';
      this.textContent = open ? 'Show quoted text' : 'Hide quoted text';
    });
    document.getElementById('threeDots').addEventListener('click', e => {
      e.stopPropagation();
      document.getElementById('navMenu').classList.toggle('open');
    });
    document.addEventListener('click', () => document.getElementById('navMenu').classList.remove('open'));
  }

  function showExpired(msg) {
    document.body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:16px;padding:24px;text-align:center;background:#0f0f0f;color:#e8e8e8;font-family:'Google Sans',Roboto,sans-serif;">
        <div style="font-size:48px;">⏰</div>
        <div style="font-size:20px;font-weight:700;">Link Expired</div>
        <div style="font-size:14px;color:#9aa0a6;">${msg}</div>
        <div style="font-size:13px;color:#6b7280;margin-top:8px;">Contact admin on Telegram to request a new link.</div>
      </div>`;
  }

  init();

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(console.error);
</script>
</body>
</html>
